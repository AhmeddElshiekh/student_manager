name: studentmanager
description: A Flutter app for managing students via Hive, QR, and modern UI.

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter


  adaptive_theme: ^3.3.0

  cupertino_icons: ^1.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  qr_flutter: ^4.1.0
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  fl_chart: ^0.64.0
  printing: ^5.11.1
  pdf: ^3.10.4
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0


  flutter_localizations:
    sdk: flutter
  uuid: ^4.0.0
  get_it: ^7.6.0
  shared_preferences: ^2.2.3
  share_plus: ^7.0.2
  flutter_slidable: ^3.0.0
  url_launcher: ^6.2.6
  intl: ^0.20.2
  permission_handler: ^11.3.1
  mobile_scanner: ^4.0.0
  open_file: ^3.3.2
  file_picker: ^10.2.0
  flutter_launcher_icons: ^0.14.4
  workmanager: ^0.9.0+2
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  dependency_validator: ^4.1.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/


  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-VariableFont_wdth,wght.ttf
